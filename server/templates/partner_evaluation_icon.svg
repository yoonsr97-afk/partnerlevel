<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- App icon background: rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight ring -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#93C5FD" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Evaluation clipboard card -->
  <g filter="url(#softShadow)">
    <rect x="146" y="120" width="220" height="290" rx="24" fill="url(#cardGrad)"/>
    <!-- Clip at top -->
    <rect x="211" y="102" width="90" height="34" rx="12" fill="#1D4ED8"/>
    <rect x="221" y="112" width="70" height="14" rx="7" fill="#DBEAFE"/>
  </g>

  <!-- Checklist lines -->
  <g stroke="#1D4ED8" stroke-width="10" stroke-linecap="round">
    <line x1="186" y1="200" x2="326" y2="200"/>
    <line x1="186" y1="238" x2="300" y2="238"/>
    <line x1="186" y1="276" x2="326" y2="276"/>
  </g>
  <g fill="#2563EB">
    <circle cx="168" cy="200" r="7"/>
    <circle cx="168" cy="238" r="7"/>
    <circle cx="168" cy="276" r="7"/>
  </g>

  <!-- Rating stars -->
  <g fill="#FBBF24">
    <path d="M186 330 l6 12 13 2 -9.5 9 2 13 -11.5 -6 -11.5 6 2 -13 -9.5 -9 13 -2 z"/>
    <path d="M232 330 l6 12 13 2 -9.5 9 2 13 -11.5 -6 -11.5 6 2 -13 -9.5 -9 13 -2 z"/>
    <path d="M278 330 l6 12 13 2 -9.5 9 2 13 -11.5 -6 -11.5 6 2 -13 -9.5 -9 13 -2 z"/>
  </g>

  <!-- Handshake / partner badge (bottom-right accent circle) -->
  <g filter="url(#softShadow)">
    <circle cx="356" cy="360" r="66" fill="#1E40AF"/>
    <circle cx="356" cy="360" r="66" fill="none" stroke="#93C5FD" stroke-width="3" stroke-opacity="0.5"/>
  </g>
  <!-- Simple handshake glyph -->
  <g transform="translate(316,338)" fill="#EFF6FF">
    <path d="M0 20 L18 6 C22 3 28 3 32 6 L46 16 L56 6 C60 2 66 2 70 6 L80 16 L80 24 L70 34 C66 38 60 38 56 34 L46 24"
          stroke="#EFF6FF" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0 20 L14 34 C18 38 24 38 28 34 L30 32"
          stroke="#EFF6FF" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
